<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <title>Stable CT AR</title>
    
    <!-- Core Libraries -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <script>
      // SIMPLE STABLE ROTATION
      AFRAME.registerComponent('touch-rotate', {
        init: function () {
          this.isDragging = false;
          this.previousTouchX = 0;
          
          window.addEventListener('touchstart', (e) => {
            this.isDragging = true;
            this.previousTouchX = e.touches[0].screenX;
          });

          window.addEventListener('touchmove', (e) => {
            if (this.isDragging) {
              let deltaX = e.touches[0].screenX - this.previousTouchX;
              this.el.object3D.rotation.y += deltaX * 0.01;
              this.previousTouchX = e.touches[0].screenX;
            }
          });

          window.addEventListener('touchend', () => {
            this.isDragging = false;
          });
        }
      });
    </script>

    <style>
      body { margin: 0; overflow: hidden; }
    </style>
  </head>

  <body>
    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; filterMinCF: 0.0001; filterBeta: 0.001;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false"
      gltf-model="dracoDecoderPath: https://www.gstatic.com/draco/v1/decoders/;">
      
      <a-assets>
        <a-asset-item id="ct-scan" src="./abed.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <!-- STABLE NESTED STRUCTURE -->
      <a-entity id="target" mindar-image-target="targetIndex: 0">
        <!-- Adjust scale if model is too big/small -->
        <a-gltf-model src="#ct-scan" 
                      position="0 0 0" 
                      scale="0.5 0.5 0.5" 
                      touch-rotate>
        </a-gltf-model>
      </a-entity>

    </a-scene>
  </body>
</html>
