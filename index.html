<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CT Scan AR</title>
    <!-- Load A-Frame and MindAR -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
  </head>
  <body>
    <!-- Setup the AR Scene -->
    <a-scene mindar-image="imageTargetSrc: ./targets.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <!-- Load your 3D Asset -->
      <a-assets>
        <a-asset-item id="ct-scan" src="./ct_model.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <!-- Attach the 3D model to the Image Target -->
      <!-- 'targetIndex: 0' means the first image you uploaded to the compiler -->
      <a-entity mindar-image-target="targetIndex: 0">
        
        <!-- Here we place the model. You may need to change scale and rotation depending on how it exported from Blender -->
        <a-gltf-model src="#ct-scan" position="0 0 0" scale="5 5 5" rotation="0 0 0"></a-gltf-model>
        
      </a-entity>
    </a-scene>
  </body>
</html>
