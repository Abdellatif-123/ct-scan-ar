<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <title>CT Scan AR - Professional Sticky</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <script>
      AFRAME.registerComponent('sticky-model', {
        init: function () {
          this.targetEl = document.querySelector('#target');
          this.cameraEl = document.querySelector('#camera');
          this.modelEl = this.el;
          
          this.isFound = false;
          this.isSticky = false;

          // 1. Listen for the very first time the paper is seen
          this.targetEl.addEventListener('targetFound', () => {
            this.isFound = true;
            this.isSticky = true; // From now on, the model stays on
            console.log("Found! Model is now sticky.");
            
            // Hide scanning UI
            const ui = document.querySelector('.mindar-ui-scanning');
            if (ui) ui.style.display = 'none';
          });

          this.targetEl.addEventListener('targetLost', () => {
            this.isFound = false;
            console.log("Lost! Switching to Screen-Lock mode.");
          });
        },

        tick: function () {
          if (!this.isSticky) return; // Don't show anything until first scan

          if (this.isFound) {
            // CASE A: We see the paper. 
            // The model is already inside the target, so MindAR handles the position.
            this.modelEl.setAttribute('visible', true);
            this.modelEl.object3D.visible = true;
          } else {
            // CASE B: We lost the paper.
            // Force the model to be visible
            this.modelEl.setAttribute('visible', true);
            this.modelEl.object3D.visible = true;

            // We need to manually move the model to the camera's view
            // because the target it is "sitting in" is no longer moving.
            // We teleport the model to be 1 meter in front of the phone.
            const camPos = this.cameraEl.object3D.position;
            
            // We use worldToLocal to move the model relative to the lost target
            // so it appears in front of the camera.
            this.modelEl.object3D.position.set(0, 0, -1); 
            this.modelEl.object3D.rotation.set(0, 0, 0); 
          }
        }
      });

      // TOUCH CONTROLS
      AFRAME.registerComponent('touch-handler', {
        init: function () {
          this.isDragging = false;
          this.previousTouch = null;
          document.addEventListener('touchmove', (e) => { e.preventDefault(); }, { passive: false });
          window.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) {
              this.isDragging = true;
              this.previousTouch = { x: e.touches[0].screenX, y: e.touches[0].screenY };
            }
          });
          window.addEventListener('touchmove', (e) => {
            if (this.isDragging && e.touches.length === 1) {
              let deltaX = e.touches[0].screenX - this.previousTouch.x;
              let deltaY = e.touches[0].screenY - this.previousTouch.y;
              this.el.object3D.rotation.y += deltaX * 0.01;
              this.el.object3D.rotation.x += deltaY * 0.01;
              this.previousTouch = { x: e.touches[0].screenX, y: e.touches[0].screenY };
            }
          });
          window.addEventListener('touchend', () => { this.isDragging = false; });
        }
      });
    </script>

    <style>
      /* Prevent the UI from ever coming back */
      .mindar-ui-scanning, .mindar-ui-overlay { display: none !important; }
    </style>
  </head>

  <body>
    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; filterMinCF: 0.0001; filterBeta: 0.001; uiScanning: no;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false"
      gltf-model="dracoDecoderPath: https://www.gstatic.com/draco/v1/decoders/;">
      
      <a-assets>
        <a-asset-item id="ct-scan" src="./abed.glb"></a-asset-item>
      </a-assets>

      <a-camera id="camera" position="0 0 0" look-controls="enabled: false"></a-camera>

      <!-- NESTED STRUCTURE: This is the safest way to ensure it appears -->
      <a-entity id="target" mindar-image-target="targetIndex: 0">
        <a-gltf-model id="model" 
                      src="#ct-scan" 
                      scale="0.5 0.5 0.5" 
                      sticky-model
                      touch-handler>
        </a-gltf-model>
      </a-entity>

    </a-scene>
  </body>
</html>
