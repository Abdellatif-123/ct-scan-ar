<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <title>CT Scan AR</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <script>
      // 1. THE AR CONTROLLER (DOM Isolation Method)
      AFRAME.registerComponent('ar-controller', {
        init: function () {
          this.targetEl = document.querySelector('#target');
          this.modelEl = document.querySelector('#model-container');
          
          this.isFound = false;
          this.hasScannedOnce = false;

          // Keep the model completely hidden until they scan the paper
          this.modelEl.setAttribute('visible', false);

          this.targetEl.addEventListener('targetFound', () => {
            this.isFound = true;
            this.hasScannedOnce = true;
            this.modelEl.setAttribute('visible', true); // Turn model on
            
            // Hide the scanning brackets permanently
            if (!document.getElementById('hide-mindar-ui')) {
              const style = document.createElement('style');
              style.id = 'hide-mindar-ui';
              style.innerHTML = `
                .mindar-ui-scanning { display: none !important; }
                .mindar-ui-overlay { display: none !important; }
              `;
              document.head.appendChild(style);
            }
          });

          this.targetEl.addEventListener('targetLost', () => {
            this.isFound = false;
          });
        },
        
        // This runs 60 times a second to place the model
        tick: function () {
          if (!this.hasScannedOnce || !this.targetEl || !this.modelEl) return;

          if (this.isFound) {
            // IF LOOKING AT PAPER: Copy the exact coordinates of the AR target
            this.modelEl.object3D.position.copy(this.targetEl.object3D.position);
            this.modelEl.object3D.quaternion.copy(this.targetEl.object3D.quaternion);
            this.modelEl.object3D.scale.copy(this.targetEl.object3D.scale);
          } else {
            // IF LOST: Snap the model perfectly in front of the phone screen!
            // (MindAR's camera is always strictly at 0,0,0)
            this.modelEl.object3D.position.set(0, 0, -1.5); 
            this.modelEl.object3D.quaternion.identity(); // Reset rotation to face user
            this.modelEl.object3D.scale.set(1, 1, 1);
          }
        }
      });

      // 2. TOUCH CONTROLS (1-Finger Rotate, 2-Finger Zoom)
      AFRAME.registerComponent('touch-handler', {
        schema: {
          minScale: { default: 0.1 },  
          maxScale: { default: 5.0 },  
          rotationFactor: { default: 5 } 
        },
        init: function () {
          this.initialScale = this.el.object3D.scale.clone();
          this.scaleFactor = 1;
          this.isDragging = false;
          this.previousTouch = null;
          this.initialDistance = null;

          document.addEventListener('touchmove', function(e) { e.preventDefault(); }, { passive: false });

          window.addEventListener('touchstart', this.onTouchStart.bind(this));
          window.addEventListener('touchmove', this.onTouchMove.bind(this));
          window.addEventListener('touchend', this.onTouchEnd.bind(this));
        },
        onTouchStart: function (e) {
          if (e.touches.length === 1) {
            this.isDragging = true;
            this.previousTouch = { x: e.touches[0].screenX, y: e.touches[0].screenY };
          } else if (e.touches.length === 2) {
            this.isDragging = false;
            this.initialDistance = this.getDistance(e.touches);
          }
        },
        onTouchMove: function (e) {
          if (e.touches.length === 1 && this.isDragging) {
            let deltaX = e.touches[0].screenX - this.previousTouch.x;
            let deltaY = e.touches[0].screenY - this.previousTouch.y;
            
            this.el.object3D.rotation.y += deltaX * 0.01 * this.data.rotationFactor;
            this.el.object3D.rotation.x += deltaY * 0.01 * this.data.rotationFactor;
            
            this.previousTouch = { x: e.touches[0].screenX, y: e.touches[0].screenY };
          } else if (e.touches.length === 2) {
            let currentDistance = this.getDistance(e.touches);
            if (this.initialDistance) {
              let zoomFactor = currentDistance / this.initialDistance;
              this.scaleFactor *= zoomFactor;
              
              this.scaleFactor = Math.max(this.data.minScale, Math.min(this.data.maxScale, this.scaleFactor));
              
              this.el.object3D.scale.x = this.initialScale.x * this.scaleFactor;
              this.el.object3D.scale.y = this.initialScale.y * this.scaleFactor;
              this.el.object3D.scale.z = this.initialScale.z * this.scaleFactor;
            }
            this.initialDistance = currentDistance;
          }
        },
        onTouchEnd: function (e) {
          if (e.touches.length < 2) { this.initialDistance = null; }
          if (e.touches.length === 0) { this.isDragging = false; }
        },
        getDistance: function (touches) {
          let dx = touches[0].screenX - touches[1].screenX;
          let dy = touches[0].screenY - touches[1].screenY;
          return Math.sqrt(dx * dx + dy * dy);
        }
      });
    </script>
  </head>

  <body>
    <!-- The ar-controller is attached to the whole scene -->
    <a-scene 
      ar-controller
      mindar-image="imageTargetSrc: ./targets.mind; filterMinCF: 0.0001; filterBeta: 0.001;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false"
      gltf-model="dracoDecoderPath: https://www.gstatic.com/draco/v1/decoders/;">
      
      <a-assets>
        <a-asset-item id="ct-scan" src="./abed.glb"></a-asset-item>
      </a-assets>

      <a-camera id="camera" position="0 0 0" look-controls="enabled: false"></a-camera>

      <!-- 1. The AR Target is now completely empty! -->
      <a-entity id="target" mindar-image-target="targetIndex: 0"></a-entity>
      
      <!-- 2. The Model Container is OUTSIDE of the target! -->
      <a-entity id="model-container">
        <!-- The actual CT scan model with the Touch Controls attached -->
        <a-gltf-model src="#ct-scan" position="0 0 0" scale="1 1 1" touch-handler></a-gltf-model>
      </a-entity>

    </a-scene>
  </body>
</html>
