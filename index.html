<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <title>CT Scan AR - Professional Sticky</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <script>
      AFRAME.registerComponent('ar-handler', {
        init: function () {
          this.targetEl = document.querySelector('#target');
          this.cameraEl = document.querySelector('#camera');
          this.modelEl = this.el;
          this.isFound = false;

          // 1. When image is found: Snap model to the PAPER
          this.targetEl.addEventListener('targetFound', () => {
            this.isFound = true;
            this.targetEl.object3D.add(this.modelEl.object3D);
            this.modelEl.object3D.position.set(0, 0, 0);
            this.modelEl.object3D.rotation.set(0, 0, 0);
            this.modelEl.setAttribute('visible', true);
            console.log("Found: Attached to Target");
          });

          // 2. When image is lost: Snap model to the PHONE SCREEN
          this.targetEl.addEventListener('targetLost', () => {
            this.isFound = false;
            this.cameraEl.object3D.add(this.modelEl.object3D);
            this.modelEl.object3D.position.set(0, 0, -1); // 1 meter in front
            this.modelEl.object3D.rotation.set(0, 0, 0);
            this.modelEl.setAttribute('visible', true);
            console.log("Lost: Rescued to Camera");
          });
        },
        
        // The "Tick" ensures MindAR doesn't try to hide the model every frame
        tick: function() {
          if (this.modelEl.object3D.visible === false && this.isFound === false) {
             this.modelEl.object3D.visible = true;
             this.modelEl.setAttribute('visible', true);
          }
        }
      });

      // TOUCH CONTROLS
      AFRAME.registerComponent('touch-handler', {
        init: function () {
          this.isDragging = false;
          this.previousTouch = null;
          document.addEventListener('touchmove', (e) => { e.preventDefault(); }, { passive: false });
          window.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) {
              this.isDragging = true;
              this.previousTouch = { x: e.touches[0].screenX, y: e.touches[0].screenY };
            }
          });
          window.addEventListener('touchmove', (e) => {
            if (this.isDragging && e.touches.length === 1) {
              let deltaX = e.touches[0].screenX - this.previousTouch.x;
              let deltaY = e.touches[0].screenY - this.previousTouch.y;
              this.el.object3D.rotation.y += deltaX * 0.01;
              this.el.object3D.rotation.x += deltaY * 0.01;
              this.previousTouch = { x: e.touches[0].screenX, y: e.touches[0].screenY };
            }
          });
          window.addEventListener('touchend', () => { this.isDragging = false; });
        }
      });
    </script>
    
    <style>
      /* Hide the scanning UI so it doesn't block the model when tracking is lost */
      .mindar-ui-scanning, .mindar-ui-overlay { display: none !important; }
    </style>
  </head>

  <body>
    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; filterMinCF: 0.0001; filterBeta: 0.001; uiScanning: no;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false"
      gltf-model="dracoDecoderPath: https://www.gstatic.com/draco/v1/decoders/;">
      
      <a-assets>
        <a-asset-item id="ct-scan" src="./abed.glb"></a-asset-item>
      </a-assets>

      <a-camera id="camera" position="0 0 0" look-controls="enabled: false"></a-camera>

      <!-- Model starts INSIDE the target so it's visible on first scan -->
      <a-entity id="target" mindar-image-target="targetIndex: 0">
        <a-gltf-model id="myModel" src="#ct-scan" 
                      position="0 0 0" 
                      scale="1 1 1" 
                      ar-handler 
                      touch-handler>
        </a-gltf-model>
      </a-entity>

    </a-scene>
  </body>
</html>
