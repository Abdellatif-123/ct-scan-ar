<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <title>CT Scan AR - World Anchor</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <script>
      AFRAME.registerComponent('ar-bridge', {
        init: function () {
          this.targetEl = document.querySelector('#target');
          this.cameraEl = document.querySelector('#camera');
          this.modelEl = this.el;
          
          this.isTracking = false;
          this.hasFoundOnce = false;

          // Listen for MindAR events
          this.targetEl.addEventListener('targetFound', () => {
            this.isTracking = true;
            this.hasFoundOnce = true;
            this.modelEl.setAttribute('visible', true);
            
            // Hide the scanning UI
            const ui = document.querySelector('.mindar-ui-scanning');
            if (ui) ui.style.display = 'none';
          });

          this.targetEl.addEventListener('targetLost', () => {
            this.isTracking = false;
          });
        },

        tick: function () {
          if (!this.hasFoundOnce) return;

          // Variables to hold world positions
          const targetWorldPos = new THREE.Vector3();
          const targetWorldQuat = new THREE.Quaternion();
          const targetWorldScale = new THREE.Vector3();

          if (this.isTracking) {
            // 1. STICK TO PAPER: Copy Paper's World Position
            this.targetEl.object3D.getWorldPosition(targetWorldPos);
            this.targetEl.object3D.getWorldQuaternion(targetWorldQuat);
            this.targetEl.object3D.getWorldScale(targetWorldScale);

            this.modelEl.object3D.position.copy(targetWorldPos);
            this.modelEl.object3D.quaternion.copy(targetWorldQuat);
            // We use a fixed scale or the target scale
            this.modelEl.object3D.scale.set(0.5, 0.5, 0.5); 
          } else {
            // 2. STICK TO SCREEN: Copy Camera Position + Offset
            // MindAR Camera is always at 0,0,0, looking down -Z
            this.modelEl.object3D.position.set(0, 0, -1); // 1 meter in front
            this.modelEl.object3D.rotation.set(0, 0, 0);  // Face user
            this.modelEl.object3D.scale.set(0.5, 0.5, 0.5);
          }
          
          // Absolute override to ensure it never disappears
          this.modelEl.object3D.visible = true;
        }
      });

      // TOUCH CONTROLS
      AFRAME.registerComponent('touch-handler', {
        init: function () {
          this.isDragging = false;
          this.previousTouch = null;
          this.scaleFactor = 1;

          document.addEventListener('touchmove', (e) => { e.preventDefault(); }, { passive: false });
          window.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) {
              this.isDragging = true;
              this.previousTouch = { x: e.touches[0].screenX, y: e.touches[0].screenY };
            }
          });
          window.addEventListener('touchmove', (e) => {
            if (this.isDragging && e.touches.length === 1) {
              let deltaX = e.touches[0].screenX - this.previousTouch.x;
              let deltaY = e.touches[0].screenY - this.previousTouch.y;
              this.el.object3D.rotation.y += deltaX * 0.01;
              this.el.object3D.rotation.x += deltaY * 0.01;
              this.previousTouch = { x: e.touches[0].screenX, y: e.touches[0].screenY };
            }
          });
          window.addEventListener('touchend', () => { this.isDragging = false; });
        }
      });
    </script>
    
    <style>
        /* Extra insurance to hide MindAR overlays */
        .mindar-ui-scanning, .mindar-ui-overlay { display: none !important; }
    </style>
  </head>

  <body>
    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiScanning: no;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false"
      gltf-model="dracoDecoderPath: https://www.gstatic.com/draco/v1/decoders/;">
      
      <a-assets>
        <a-asset-item id="ct-scan" src="./abed.glb"></a-asset-item>
      </a-assets>

      <a-camera id="camera" position="0 0 0" look-controls="enabled: false"></a-camera>

      <!-- The target is now just an invisible reference point -->
      <a-entity id="target" mindar-image-target="targetIndex: 0"></a-entity>

      <!-- The model is OUTSIDE the target, attached directly to the scene -->
      <a-entity id="model-anchor" ar-bridge visible="false">
        <a-gltf-model src="#ct-scan" touch-handler></a-gltf-model>
      </a-entity>

    </a-scene>
  </body>
</html>
